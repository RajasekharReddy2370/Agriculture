<!DOCTYPE html>
<html>

<head>

    <title>Register User</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#000;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            padding:30px;

        }

        .container{

            width:500px;

            background:#111;

            padding:35px;

            border-radius:20px;

            box-shadow:0 0 20px rgba(255,255,255,0.15);

        }

        h2{

            color:white;

            text-align:center;

            margin-bottom:25px;

        }

        label{

            display:block;

            color:white;

            font-weight:bold;

            margin-top:12px;

            margin-bottom:5px;

        }

        input,
        select{

            width:100%;

            padding:12px;

            border:none;

            border-radius:30px;

            outline:none;

            font-size:15px;

            background:white;

        }

        input[type="file"]{

            padding:10px;

            background:white;

        }

        .btn{

            width:100%;

            padding:14px;

            margin-top:25px;

            border:none;

            border-radius:30px;

            background:green;

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

        }

        .btn:hover{

            background:#0a8d0a;

        }

        .back{

            display:block;

            text-align:center;

            margin-top:20px;

            color:white;

            text-decoration:none;

            font-weight:bold;

        }

        .back:hover{

            color:lightgreen;

        }

        .error{

            color:red;

            text-align:center;

            font-weight:bold;

            margin-bottom:15px;

        }

    </style>

</head>

<body>

<div class="container">

    <h2>Register User</h2>

    {% if error %}

        <div class="error">

            {{ error }}

        </div>

    {% endif %}

    <form
            method="POST"
            enctype="multipart/form-data">

        {% csrf_token %}

        <label>Username</label>

        <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

        <label>First Name</label>

        <input
                type="text"
                name="firstname"
                placeholder="Enter First Name"
                required>

        <label>Last Name</label>

        <input
                type="text"
                name="lastname"
                placeholder="Enter Last Name">

        <label>Nickname</label>

        <input
                type="text"
                name="nickname"
                placeholder="Enter Nickname">

        <label>Email</label>

        <input
                type="email"
                name="email"
                placeholder="Enter Email">

        <label>Personal Phone Number</label>

        <input
                type="text"
                name="personal_phone_number"
                placeholder="Enter Personal Phone Number"
                required>

        <label>Home Phone Number</label>

        <input
                type="text"
                name="home_phone_number"
                placeholder="Enter Home Phone Number">

        <label>Bike</label>

        <input
                type="text"
                name="bike"
                placeholder="Enter Bike">

        <label>Address</label>

        <input
                type="text"
                name="address"
                placeholder="Enter Address">

        <label>Designation</label>

        <select
                name="designation"
                required>

            <option value="">

                Select Designation

            </option>

            {% for d in designations %}

            <option value="{{ d.id }}">

                {{ d.name }}

            </option>

            {% endfor %}

        </select>

        <label>Profile Picture</label>

        <input
                type="file"
                name="profilepic"
                accept="image/*">

        <label>Password</label>

        <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

        <label>Confirm Password</label>

        <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
                required>

        <button
                type="submit"
                class="btn">

            Register

        </button>

    </form>

    <a
       href="{% url 'options' %}"
       class="back">

        ← Back to Options

    </a>

</div>

</body>

</html>
