<!DOCTYPE html>
<html>

<head>

    <title>Options</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#000;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .container{

            width:450px;

            background:#111;

            padding:40px;

            border-radius:20px;

            text-align:center;

            box-shadow:0 0 20px rgba(255,255,255,0.15);

        }

        h2{

            color:white;

            margin-bottom:15px;

        }

        h3{

            color:#ddd;

            margin-bottom:35px;

            font-weight:normal;

        }

        button{

            width:100%;

            padding:15px;

            margin-top:15px;

            border:none;

            border-radius:30px;

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

        }

        .register{

            background:#007bff;

        }

        .dashboard{

            background:green;

        }

        .logout{

            background:red;

        }

        button:hover{

            opacity:0.9;

        }

    </style>

</head>

<body>

<div class="container">

    <h2>

        Welcome {{ request.user.username }}

    </h2>

    <h3>

        {{ request.user.designation.name }}

    </h3>

    {% if can_register %}

    <a href="{% url 'register' %}">

        <button class="register">

            Register User

        </button>

    </a>

    {% endif %}

    <a href="{% url 'dashboard' %}">

        <button class="dashboard">

            Dashboard

        </button>

    </a>

    <a href="{% url 'logout' %}">

        <button class="logout">

            Logout

        </button>

    </a>

</div>

</body>

</html>
