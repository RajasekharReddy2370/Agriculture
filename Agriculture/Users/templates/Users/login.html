<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#000;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .container{

            width:420px;

            background:#111;

            padding:40px;

            border-radius:20px;

            box-shadow:0 0 20px rgba(255,255,255,0.15);

        }

        h2{

            color:white;

            text-align:center;

            margin-bottom:30px;

        }

        label{

            color:white;

            font-weight:bold;

            display:block;

            margin-bottom:5px;

            margin-top:15px;

        }

        input{

            width:100%;

            padding:12px;

            border:none;

            border-radius:30px;

            outline:none;

            background:white;

            font-size:15px;

        }

        button{

            width:100%;

            margin-top:30px;

            padding:14px;

            border:none;

            border-radius:30px;

            background:green;

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

        }

        button:hover{

            background:#0b8d0b;

        }

        .error{

            color:red;

            text-align:center;

            margin-top:15px;

            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="container">

    <h2>Login</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Username</label>

        <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

        <label>Password</label>

        <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

        <button type="submit">

            Login

        </button>

    </form>

    {% if error %}

        <p class="error">

            {{ error }}

        </p>

    {% endif %}

</div>

</body>

</html>
