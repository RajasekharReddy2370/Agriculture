<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body {
            margin: 0;
            padding: 0;

            background-color: black;

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
        }

        .container {
            width: 350px;
            text-align: center;
        }

        h2 {
            color: white;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 25px;

            box-sizing: border-box;

            margin-bottom: 15px;

            font-size: 15px;
            font-weight: bold;
        }

        input::placeholder {
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 25px;

            background-color: white;
            color: black;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;
        }

        button:hover {
            background-color: #d9d9d9;
        }

        .error {
            color: red;
            margin-top: 15px;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <div class="container">

        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

    </div>

</body>
</html>
